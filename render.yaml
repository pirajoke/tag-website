services:
  - type: web
    name: tag-website
    runtime: node
    repo: https://github.com/pirajoke/tag-website
    branch: main
    plan: free
    region: oregon
    autoDeploy: true
    buildCommand: npm ci && npm run build
    startCommand: npm run start -- -H 0.0.0.0
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
